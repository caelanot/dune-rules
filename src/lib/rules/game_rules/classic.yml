- name: Sequence of Play
  colorcode: rules
  children:
    - name: Storm Phase
      children:
        - name: Storm Movement
          text: >
            In all Storm Phases after turn 1, the two players who last used the
            Battle Wheels will independently dial a number from 1 to 3, simultaneously
            reveal their numbers, add them together, and then advance the Storm Marker
            from its current position _counterclockwise_ around the map for the
            sum total of sectors.
        - name: Damage
          text: >
            Any forces in a sector of a sand territory over which the storm starts,
            passes, or stops are destroyed. Place these forces in the Tleilaxu Tanks.
            Forces that are not on a sand territory find protection from the storm.
            In addition, any spice in a sector over which the storm passes or stops
            is destroyed and placed in the Spice Bank.
        - name: Obstruction
          text: Forces may not move, ship, or be sent into, out of, or through a sector in storm.
        - name: First Player
          text: >
            The player whose Player Marker the storm next approaches will be the
            _First Player_ for this turn in each applicable phase and action.
    - name: Spice Blow and Nexus Phase
      children:
        - name: First Turn
          text: >
            During the first turn's Spice Blow Phase, all Shai-Hulud Cards revealed are
            ignored and set aside, then reshuffled back into the Spice Deck after this phase.
        - name: Top Card
          text: The top card of the Spice Deck is revealed and put on the discard pile.
        - name: Territory
          text: >
            This is a Spice Blow. The amount of spice indicated on the card is taken from
            the Spice Bank and placed onto the territory in the sector containing the Spice
            Blow icon. Then this card is placed face up on the Spice Blow discard pile.
            (If the Spice Blow icon is currently in storm, no spice is placed for that Spice Blow.)
        - name: Shai-Hulud
          children:
            - name: A
              text: >
                All spice and forces in the territory shown on the Territory Card now face up
                in the discard pile are destroyed and placed into the Spice Bank and Tleilaxu
                Tanks respectively. Then the Shai-Hulud card is placed face up on the Spice
                Deck discard pile.
            - name: Spice Blow
              text: >
                Then another card is revealed. If it is not a Territory Card, it is immediately
                discarded and another card is revealed. This continues until a Territory Card
                appears and spice is placed as defined above.
            - name: Nexus
    - name: CHOAM Charity Phase
      children:
        - name: CHOAM Collection
          text: >
            All players with 0 or 1 spice can collect spice to bring their total to 2
            by calling out "Choam Charity".
        - name: Fraud Safeguards
          text: A player may only claim CHOAM Charity once per turn.
    - name: Bidding Phase
      children:
        - name: Declaration and Transparency
          text: >
            At the start of the phase, all players must declare the number of Treachery
            Cards they hold. This is public information throughout this phase.
        - name: Hand Limit and Bidding
          text: A player's hand limit is 4 Treachery Cards.
        - name: Eligible for Bidding
          text: Players with a full hand are not eligible to bid and must pass.
        - name: Dealer
        - name: Auction
          children:
            - name: Starting Bid
            - name: Bidding Procedure
            - name: Bid Limit
            - name: Time Limit
        - name: Next Starting Bidder
        - name: End of Bidding
    - name: Revival Phase
      children:
        - name: Force Revival
          children:
            - name: Free
              text: A certain number of forces are revived for free as stated on the player sheet.
            - name: With Spice
              text: Any additional 
            - name: Limit
              text: 
        - name: Leader Revival
          children:
            - name: Cost
            - name: Revived Leader Status
            - name: Dead Again
    - name: Shipment and Movement Phase
      children:
        - name: Force Shipment
        - name: Force Movement
    - name: Battle Phase
      children:
        - name: Battle Determination
        - name: Battle Plan
        - name: Battle Resolution
    - name: Spice Harvest Phase
    - name: Mentat Pause Phase
      children:
        - name: Stronghold Victory
        - name: Bribe Collection
        - name: War Continues
    - name: Alliances
      children:
        - name: Forming an Alliance
          children:
            - name: Basics
            - name: Discussion
            - name: Transparency
              text: >
                The members of an alliance must be revealed to all. Alliances cannot be secret.
                Swap Alliance Cards as a reminder of who are in an alliance.
            - name: Limits
        - name: Breaking an Alliance
          children:
            - name: Breaking
            - name: Joining Another Alliance
        - name: How an Alliance Fuctions
          children:
