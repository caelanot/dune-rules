- name: Atreides
  colorcode: "#586a37"
  text: You have limited prescience.
  children:
    - name: Faction Rules
      children:
        - name: At Start
          children:
          - name: Spice
            text: Start with 10 spice.
          - name: Forces
            text: 10 forces in _Arrakeen_ and 10 forces in reserves.
          - name: Spice and Treachery Decks
            text: >
              Take the Spice Deck and Treachery Deck, and put
              them near your player position. You manage these decks.
        - name: Free Revival
          text: 2 forces.

